<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Ventas - Las Mezcladitas</title>
        <link rel="stylesheet" href="../css/global_styles.css">
        <link rel="stylesheet" href="../css/inventario_ventas.css">
    </head>
    <body>
        <aside class="sidebar">
            <h2 class="logo">Las Mezlcaditas</h2>
            <ul class="menu">
            <li><a href="dashboard.html">Inicio</a></li>
            <li><a href="inventario.html">Inventario</a></li>
            <li><a href="ventas.html">Ventas</a></li>
            <li id="menu_usuarios" style="display:none"><a href="admin_usuarios.html">Usuarios</a></li>
            <li class="logout" onclick="logOut()">Cerrar sesión</li>
            </ul>
        </aside>

        <div class="main">
            <header class="topbar">
                <h2>Ventas</h2>
                <h2>Bienvenid@ <span id="nombre"></span></h2>
            </header>
            <a href="post_venta.html"><button class="btn-top">+ Nueva Venta</button></a>
            <input type="text" id="buscador" placeholder="Buscar venta ..." oninput="buscarVenta()" class="buscador">
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>ID de Usuario</th>  
                            <th>ID de Producto</th>
                            <th>Nombre</th>
                            <th>Categoria</th>
                            <th>Unidades Vendidas</th>
                            <th>Total</th>
                            <th>Fecha</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_ventas">
                    </tbody>
                </table>
            </div>
        </div>
        <script src="../js/logout.js"></script>
        <script src="../js/ventas.js"></script>
</body>
</html>
