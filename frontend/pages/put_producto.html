<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modificar Producto - Las Mezcladitas</title>
        <link rel="stylesheet" href="../css/global_styles.css">
        <link rel="stylesheet" href="../css/post.css">
        <link rel="stylesheet" href="../css/inventario_ventas.css">
    </head>
    <body>
        <aside class="sidebar">
            <h2 class="logo">Las Mezlcaditas</h2>
            <ul class="menu">
            <li><a href="dashboard.html">Inicio</a></li>
            <li><a href="inventario.html">Inventario</a></li>
            <li><a href="ventas.html">Ventas</a></li>
            <li id="menu_usuarios" style="display:none"><a href="admin_usuarios.html">Usuarios</a></li>
            <li class="logout" onclick="logOut()">Cerrar sesión</li>
            </ul>
        </aside>
        <div class="main">
            <header class="topbar">
                <h2>Modificar Producto</h2>
            </header>
            <label>Producto Seleccionado</label>
            <div class="tabla-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Categoria</th>  
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Descripcion</th>
                            <th>Precio</th>
                            <th>Unidades Disponibles</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_inventario">
                    </tbody>
                </table>
            </div>
            <div class="campo">
                <label>Categoria: </label>
                <input type="text" id="categoria" placeholder="Ingresar categoria">
            </div>
            <div class="campo">
                <label>Nombre: </label>
                <input type="text" id="nombre" placeholder="Ingresar nombre">
            </div>
            <div class="campo">
                <label>Marca: </label>
                <input type="text" id="marca" placeholder="Ingresar marca">
            </div>
            <div class="campo">
                <label>Descripcion: </label>
                <input type="text" id="descripcion" placeholder="Ingresar descripcion">
            </div>
            <div class="campo">
                <label>Precio: </label>
                <input type="number" id="precio" placeholder="Ingresar precio">
            </div>
            <div class="campo">
                <label>Unidades Disponibles: </label>
                <input type="number" id="existencia" placeholder="Ingresar unidades disponibles">
            </div>
            <button class="crear" onclick=modificarProducto()>Guardar Cambios</button>
        </div>
        <script src="../js/logout.js"></script>
        <script src="../js/put_inventario.js"></script>
    </body>
</html>
