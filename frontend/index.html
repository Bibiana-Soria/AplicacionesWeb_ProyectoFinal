<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=width-device initial-scale=1.0">
        <title>Iniciar Sesión - Las Mezlcaditas</title>
        <link rel="stylesheet" href="css/login_usuario.css">
    </head>
<body>
    <div class="container">
        <h1>Las Mezlcaditas</h1>
        <h2>Iniciar Sesión</h2>
        <div class="campo">
            <label>Correo</label>
            <input type="email" id="email" placeholder="correo@sitio.com">
        </div>
        <div class="campo">
            <label>Contraseña</label>
            <input type="password" id="contrasena" placeholder="********">
        </div>
        <button id="btn-login" onclick=login()>Ingresar</button>
        <p><a href="pages/usuario.html">Registrate aquí</a></p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
